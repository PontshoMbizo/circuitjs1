<script>
// ---- bridge to the embedded CircuitJS1 simulator -------------------------
const pollSim = () => {
    const iframe = document.getElementById('simFrame');
    if (iframe && iframe.contentWindow && iframe.contentWindow.CircuitJS1 && iframe.contentWindow.CircuitJS1.triggerMenu) {
        initUI(iframe.contentWindow.CircuitJS1);
    } else {
        setTimeout(pollSim, 50);
    }
};

const DEFAULT_CIRCUIT = `$ 1 5.0E-6 10.20027730826997 43 5.0 43
v 200 300 200 150 0 0 40.0 5.0 0.0 0.0 0.5
w 200 150 250 150 0
r 250 150 350 150 0 10.0
w 350 150 450 150 0
l 450 150 450 300 0 1.0 0.0
w 450 300 350 300 0
c 350 300 250 300 0 1.5E-5 0.0
w 250 300 200 300 0`;

// ---- resonant frequency: f = 1 / (2*pi*sqrt(L*C)) ------------------------
const fmtFreq = (f) => {
    if (f == null || !isFinite(f) || f <= 0) return '—';
    if (f >= 1e6) return (f / 1e6).toFixed(3) + ' MHz';
    if (f >= 1e3) return (f / 1e3).toFixed(3) + ' kHz';
    return f.toFixed(3) + ' Hz';
};

const computeResF = (netlist) => {
    let L = null, C = null;
    netlist.split('\n').forEach(line => {
        const p = line.trim().split(/\s+/);
        if (p[0] === 'l' && L === null && p.length >= 7) L = parseFloat(p[6]); // inductor: henries
        if (p[0] === 'c' && C === null && p.length >= 7) C = parseFloat(p[6]); // capacitor: farads
    });
    if (L > 0 && C > 0) return 1 / (2 * Math.PI * Math.sqrt(L * C));
    return null;
};

const updateResF = (netlist) => {
    const el = document.getElementById('readout-resf');
    if (el) el.textContent = fmtFreq(computeResF(netlist));
};

const initUI = (sim) => {
    console.log("CircuitJS UI attached!");
    window.sim = sim;

    let isRunning = true;

    const showRunning = (running) => {
        isRunning = running;
        document.getElementById('btn-stop').style.display = running ? 'flex' : 'none';
        document.getElementById('btn-run').style.display  = running ? 'none' : 'flex';
        document.getElementById('led-run').style.display  = running ? 'block' : 'none';
        document.getElementById('led-stop').style.display = running ? 'none' : 'block';
    };

    // --- Run / Stop -------------------------------------------------------
    document.getElementById('btn-stop').addEventListener('click', () => {
        sim.setSimRunning(false);
        showRunning(false);
    });
    document.getElementById('btn-run').addEventListener('click', () => {
        sim.setSimRunning(true);
        showRunning(true);
    });

    // --- Reset simulation (time -> 0) ------------------------------------
    document.getElementById('btn-reset').addEventListener('click', () => {
        if (sim.reset) sim.reset();
    });

    // --- Reset to template (reload the starting circuit) -----------------
    document.getElementById('btn-reset-template').addEventListener('click', () => {
        sim.importCircuit(DEFAULT_CIRCUIT, false);
        updateResF(DEFAULT_CIRCUIT);
        sim.setSimRunning(true);
        showRunning(true);
    });

    // --- Submit: integration hook for a host app -------------------------
    // No grading backend lives here; we surface the event so an embedding
    // app can listen via postMessage or a window.onSimulatorSubmit hook.
    document.getElementById('btn-submit').addEventListener('click', () => {
        const btn = document.getElementById('btn-submit');
        const payload = {
            type: 'simulator:submit',
            time:  sim.getTime ? sim.getTime() : null,
            valid: sim.isCircuitValid ? sim.isCircuitValid() : null,
            error: sim.getSimulationErrors ? sim.getSimulationErrors() : null
        };
        try { if (window.parent && window.parent !== window) window.parent.postMessage(payload, '*'); } catch (e) {}
        if (typeof window.onSimulatorSubmit === 'function') {
            try { window.onSimulatorSubmit(payload); } catch (e) {}
        }
        if (btn.animate) {
            btn.animate(
                [{ transform: 'scale(1)' }, { transform: 'scale(0.86)' }, { transform: 'scale(1)' }],
                { duration: 220, easing: 'ease-out' }
            );
        }
    });

    // --- Fullscreen ------------------------------------------------------
    document.getElementById('btn-fullscreen').addEventListener('click', () => {
        const el = document.documentElement;
        if (document.fullscreenElement) {
            if (document.exitFullscreen) document.exitFullscreen();
        } else if (el.requestFullscreen) {
            el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        }
    });

    // --- Time + Res.F readout --------------------------------------------
    setInterval(() => {
        if (isRunning && sim.getTime) {
            const t = sim.getTime();
            document.getElementById('readout-time').textContent =
                (t >= 1 ? t.toFixed(2) + ' s' : (t * 1000).toFixed(1) + ' ms');
        }
    }, 100);

    // --- Speed slider ----------------------------------------------------
    const track = document.getElementById('speed-track');
    const fill  = document.getElementById('speed-fill');
    const thumb = document.getElementById('speed-thumb');
    const label = document.getElementById('speed-label');

    const setSpeed = (pct) => {
        pct = Math.max(0, Math.min(100, Math.round(pct)));
        fill.style.width = pct + '%';
        thumb.style.left = pct + '%';
        label.textContent = pct + '%';
        if (sim.setSpeed) sim.setSpeed(pct);
    };

    const startDrag = (e) => {
        e.preventDefault();
        const move = (ev) => {
            const r = track.getBoundingClientRect();
            const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
            setSpeed(((x - r.left) / r.width) * 100);
        };
        move(e);
        const up = () => {
            window.removeEventListener('pointermove', move);
            window.removeEventListener('pointerup', up);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
    };
    track.addEventListener('pointerdown', startDrag);
    setSpeed(78);

    // --- Dropdown menus --------------------------------------------------
    const toggleMenu = (btnId, menuId) => {
        const btn = document.getElementById(btnId);
        const menu = document.getElementById(menuId);
        if (!btn || !menu) return;
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(m => { if (m !== menu) m.classList.remove('show'); });
            menu.classList.toggle('show');
        });
    };
    toggleMenu('btn-draw', 'menu-draw');
    toggleMenu('btn-scopes', 'menu-scopes');
    toggleMenu('btn-select', 'menu-select');
    toggleMenu('btn-more', 'menu-more');

    document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
    });

    // Trigger native simulator menu actions via the JS interface
    const setActive = (el, on) => {
        el.style.background = on ? 'rgba(22,163,74,.2)' : 'transparent';
        el.style.color = on ? '#4ade80' : '#9ca3af';
    };
    document.querySelectorAll('.dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.stopPropagation();
            const menu = item.getAttribute('data-menu');
            const action = item.getAttribute('data-item');
            if (sim.triggerMenu) sim.triggerMenu(menu, action);

            const draw = document.getElementById('btn-draw');
            const select = document.getElementById('btn-select');
            if (menu === 'main' && (action === 'Select' || action === 'DragAll')) {
                setActive(select, true); setActive(draw, false);
            } else if (menu === 'main' && action !== 'newblankcircuit' && !action.startsWith('export')) {
                setActive(draw, true); setActive(select, false);
            }

            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        });
    });

    // --- Boot ------------------------------------------------------------
    sim.importCircuit(DEFAULT_CIRCUIT, false);
    updateResF(DEFAULT_CIRCUIT);
    showRunning(true);
};

window.addEventListener('DOMContentLoaded', pollSim);
</script>

        <button class="dropdown-item" data-menu="main" data-item="CC2Elm">CCII+</button>
        <button class="dropdown-item" data-menu="main" data-item="CC2NegElm">CCII-</button>
        <button class="dropdown-item" data-menu="main" data-item="ComparatorElm">Comparator (Hi-Z/GND output)</button>
        <button class="dropdown-item" data-menu="main" data-item="OTAElm">OTA (LM13700 style)</button>
        <button class="dropdown-item" data-menu="main" data-item="VCVSElm">Voltage-Controlled Voltage Source (VCVS)</button>
        <button class="dropdown-item" data-menu="main" data-item="VCCSElm">Voltage-Controlled Current Source (VCCS)</button>
        <button class="dropdown-item" data-menu="main" data-item="CCVSElm">Current-Controlled Voltage Source (CCVS)</button>
        <button class="dropdown-item" data-menu="main" data-item="CCCSElm">Current-Controlled Current Source (CCCS)</button>
        <button class="dropdown-item" data-menu="main" data-item="OptocouplerElm">Optocoupler</button>
        <button class="dropdown-item" data-menu="main" data-item="TimeDelayRelayElm">Time Delay Relay</button>
        <button class="dropdown-item" data-menu="main" data-item="CustomCompositeElm:~LM317-v2">LM317</button>
        <button class="dropdown-item" data-menu="main" data-item="CustomCompositeElm:~TL431">TL431</button>
        <button class="dropdown-item" data-menu="main" data-item="MotorProtectionSwitchElm">Motor Protection Switch</button>
        <button class="dropdown-item" data-menu="main" data-item="CustomCompositeElm">Subcircuit Instance</button>
      </div>
    </div>

    <div class="menu-container">
      <button id="btn-scopes" title="Scopes" style="width:34px;height:34px;border:0;background:transparent;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.color='#9ca3af';this.style.background='transparent'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>
      </button>
      <div class="dropdown-menu" id="menu-scopes">
        <button class="dropdown-item" data-menu="scopes" data-item="stackAll">Stack All Scopes</button>
        <button class="dropdown-item" data-menu="scopes" data-item="unstackAll">Unstack All Scopes</button>
        <button class="dropdown-item" data-menu="scopes" data-item="combineAll">Combine All Scopes</button>
      </div>
    </div>

    <div class="menu-container">
      <button id="btn-select" title="Edit / select" style="width:34px;height:34px;border:0;background:transparent;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.color='#9ca3af';this.style.background='transparent'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 17 2.51-7.39L20 10.07z"/></svg>
      </button>
      <div class="dropdown-menu" id="menu-select">
        <button class="dropdown-item" data-menu="main" data-item="Select">Select / Edit</button>
        <button class="dropdown-item" data-menu="main" data-item="DragAll">Drag All</button>
      </div>
    </div>

    <div style="width:1px;height:20px;background:rgba(255,255,255,.12)"></div>

    <div class="menu-container">
      <button id="btn-more" title="More tools" style="width:34px;height:34px;border:0;background:transparent;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,.08)'" onmouseout="this.style.color='#9ca3af';this.style.background='transparent'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="dropdown-menu" id="menu-more">
        <button class="dropdown-item" data-menu="main" data-item="newblankcircuit">Clear Canvas</button>
        <button class="dropdown-item" data-menu="main" data-item="exportasurl">Export as Link</button>
        <button class="dropdown-item" data-menu="main" data-item="exportasimage">Export as Image</button>
        <button class="dropdown-item" data-menu="main" data-item="exportastext">Export as Text</button>
      </div>
    </div>
  </div>

  <!-- top-right : scope readout / reset template / submit / fullscreen -->
  <div style="position:absolute;top:18px;right:18px;z-index:5;display:flex;align-items:center;gap:9px">
    <!-- scope / status readout -->
    <div style="display:flex;align-items:center;gap:14px;padding:7px 15px;background:rgba(18,18,20,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:13px;box-shadow:0 6px 22px rgba(0,0,0,.4)">
      <div><div style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:#6b7280;margin-bottom:2px">Time</div><div id="readout-time" style="font-family:'Geist Mono',monospace;font-size:13px;font-weight:600;color:#e5e7eb">0.0&#8201;s</div></div>
      <div><div style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:#6b7280;margin-bottom:2px">Res&middot;F</div><div id="readout-resf" style="font-family:'Geist Mono',monospace;font-size:13px;font-weight:600;color:#4ade80">&#8212;</div></div>
      <div id="led-run" style="width:9px;height:9px;border-radius:999px;background:#22c55e;box-shadow:0 0 9px #22c55e;animation:led 1.4s ease-in-out infinite"></div>
      <div id="led-stop" style="display:none;width:9px;height:9px;border-radius:999px;background:#4b5563"></div>
    </div>
    <button id="btn-reset" title="Reset simulation" style="width:40px;height:40px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.color='#9ca3af';this.style.background='rgba(255,255,255,.05)'">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.6-6.4L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <button id="btn-stop" title="Stop" style="width:42px;height:42px;border:0;background:#ef4444;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 0 0 1px rgba(239,68,68,.5),0 4px 16px rgba(239,68,68,.5);transition:all .15s" onmouseover="this.style.background='#dc2626'" onmouseout="this.style.background='#ef4444'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="3"/></svg>
    </button>
    <button id="btn-run" title="Run" style="display:none;width:42px;height:42px;border:0;background:#16a34a;border-radius:999px;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 0 0 1px rgba(22,163,74,.5),0 4px 16px rgba(22,163,74,.55);transition:all .15s" onmouseover="this.style.background='#15803d'" onmouseout="this.style.background='#16a34a'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div style="width:1px;height:24px;background:rgba(255,255,255,.14)"></div>
    <button id="btn-reset-template" title="Reset to template" style="width:40px;height:40px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.color='#9ca3af';this.style.background='rgba(255,255,255,.05)'">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="5" x2="5" y2="19"/></svg>
    </button>
    <button id="btn-submit" title="Submit solution" style="width:40px;height:40px;border:0;background:#16a34a;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 2px 14px rgba(22,163,74,.5);transition:all .15s" onmouseover="this.style.background='#15803d'" onmouseout="this.style.background='#16a34a'">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
    <button id="btn-fullscreen" title="Fullscreen" style="width:40px;height:40px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#9ca3af'">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
  </div>

  <!-- bottom-right : sim speed -->
  <div style="position:absolute;bottom:18px;right:18px;z-index:5;display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(18,18,20,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.45)">
    <span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:#6b7280">Speed</span>
    <div id="speed-track" style="position:relative;width:116px;height:14px;display:flex;align-items:center;cursor:pointer;touch-action:none">
      <div style="position:absolute;left:0;right:0;height:4px;border-radius:999px;background:rgba(255,255,255,.12)"></div>
      <div id="speed-fill" style="position:absolute;left:0;height:4px;border-radius:999px;background:#22c55e;width:78%"></div>
      <div id="speed-thumb" style="position:absolute;width:15px;height:15px;border-radius:999px;background:#fff;border:2px solid #22c55e;box-shadow:0 1px 5px rgba(0,0,0,.55);left:78%;transform:translateX(-50%)"></div>
    </div>
    <span id="speed-label" style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:#e5e7eb;min-width:30px;text-align:right">78%</span>
  </div>

</div>
</body>
</html>
