<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:#070707}
@keyframes flow{to{stroke-dashoffset:-18}}
@keyframes led{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</helmet>

<div style="position:relative;width:100%;height:100vh;min-height:600px;overflow:hidden;font-family:'Geist',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#070707">

  <!-- canvas surface -->
  <div style="position:absolute;inset:0;color:#4b5563;background-image:radial-gradient(#161616 1.1px,transparent 1.1px),radial-gradient(125% 95% at 50% 30%,#191919 0%,#070707 72%);background-size:26px 26px,100% 100%;z-index:1">{{ circuit }}</div>
  <div style="position:absolute;inset:0;z-index:2;pointer-events:none">{{ flow }}</div>
  <div style="position:absolute;inset:0;z-index:3;pointer-events:none;box-shadow:inset 0 0 160px 40px rgba(0,0,0,.6)"></div>

  <!-- top-left : tools -->
  <div style="position:absolute;top:18px;left:18px;z-index:5;display:flex;align-items:center;gap:3px;padding:4px;background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:999px;box-shadow:0 6px 22px rgba(0,0,0,.4)">
    <button title="Draw" style="width:34px;height:34px;border:0;background:rgba(22,163,74,.2);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#4ade80;cursor:pointer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"/><path d="M2 2l7.586 7.586"/></svg>
    </button>
    <button title="Scopes" style="width:34px;height:34px;border:0;background:transparent;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" style-hover="color:#fff;background:rgba(255,255,255,.08)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>
    </button>
    <button title="Edit / select" style="width:34px;height:34px;border:0;background:transparent;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" style-hover="color:#fff;background:rgba(255,255,255,.08)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 17 2.51-7.39L20 10.07z"/></svg>
    </button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,.12)"></div>
    <button title="More tools" data-comment-anchor="a508db076c-button" style="width:34px;height:34px;border:0;background:transparent;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" style-hover="color:#fff;background:rgba(255,255,255,.08)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
  </div>

  <!-- top-right : scope readout / reset template / submit / fullscreen -->
  <div style="position:absolute;top:18px;right:18px;z-index:5;display:flex;align-items:center;gap:9px">
    <!-- scope / status readout -->
    <div style="display:flex;align-items:center;gap:14px;padding:7px 15px;background:rgba(18,18,20,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:13px;box-shadow:0 6px 22px rgba(0,0,0,.4)">
      <div><div style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:#6b7280;margin-bottom:2px">Time</div><div style="font-family:'Geist Mono',monospace;font-size:13px;font-weight:600;color:#e5e7eb">125.6&#8201;ms</div></div>
      <div><div style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:#6b7280;margin-bottom:2px">Res&middot;F</div><div style="font-family:'Geist Mono',monospace;font-size:13px;font-weight:600;color:#4ade80">41.094&#8201;Hz</div></div>
      <sc-if value="{{ run }}" hint-placeholder-val="{{ true }}"><span style="width:9px;height:9px;border-radius:999px;background:#22c55e;box-shadow:0 0 9px #22c55e;animation:led 1.4s ease-in-out infinite"></span></sc-if>
      <sc-if value="{{ stopped }}" hint-placeholder-val="{{ false }}"><span style="width:9px;height:9px;border-radius:999px;background:#4b5563"></span></sc-if>
    </div>
    <button title="Reset simulation" style="width:40px;height:40px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" style-hover="color:#fff;background:rgba(255,255,255,.1)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.6-6.4L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <sc-if value="{{ run }}" hint-placeholder-val="{{ true }}">
      <button onClick="{{ toggle }}" title="Stop" style="width:42px;height:42px;border:0;background:#ef4444;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 0 0 1px rgba(239,68,68,.5),0 4px 16px rgba(239,68,68,.5);transition:all .15s" style-hover="background:#dc2626">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="3"/></svg>
      </button>
    </sc-if>
    <sc-if value="{{ stopped }}" hint-placeholder-val="{{ false }}">
      <button onClick="{{ toggle }}" title="Run" style="width:42px;height:42px;border:0;background:#16a34a;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 0 0 1px rgba(22,163,74,.5),0 4px 16px rgba(22,163,74,.55);transition:all .15s" style-hover="background:#15803d">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </sc-if>
    <div style="width:1px;height:24px;background:rgba(255,255,255,.14)"></div>
    <button title="Reset to template" style="width:40px;height:40px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" style-hover="color:#fff;background:rgba(255,255,255,.1)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="5" x2="5" y2="19"/></svg>
    </button>
    <button title="Submit solution" style="width:40px;height:40px;border:0;background:#16a34a;border-radius:999px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 2px 14px rgba(22,163,74,.5);transition:all .15s" style-hover="background:#15803d">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
    <button title="Fullscreen" style="width:40px;height:40px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:999px;display:flex;align-items:center;justify-content:center;color:#9ca3af;cursor:pointer;transition:all .15s" style-hover="color:#fff">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
  </div>

  <!-- bottom-right : sim speed (compact) -->
  <div style="position:absolute;bottom:18px;right:18px;z-index:5;display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(18,18,20,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.45)">
    <span style="font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:#6b7280">Speed</span>
    <div onPointerDown="{{ drag }}" style="position:relative;width:116px;height:14px;display:flex;align-items:center;cursor:pointer;touch-action:none" data-comment-anchor="9e4831b68d-div">
      <div style="position:absolute;left:0;right:0;height:4px;border-radius:999px;background:rgba(255,255,255,.12)"></div>
      <div style="position:absolute;left:0;height:4px;border-radius:999px;background:#22c55e;width:{{ speed }}%"></div>
      <div style="position:absolute;width:15px;height:15px;border-radius:999px;background:#fff;border:2px solid #22c55e;box-shadow:0 1px 5px rgba(0,0,0,.55);left:{{ speed }}%;transform:translateX(-50%)"></div>
    </div>
    <span style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:#e5e7eb;min-width:30px;text-align:right">{{ speed }}%</span>
  </div>


</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:720}}">
class Component extends DCLogic {
  state = { run: true, speed: 78 };

  toggle() { this.setState(s => ({ run: !s.run })); }

  setSpeed(v) {
    v = Math.max(0, Math.min(100, Math.round(v)));
    this.setState({ speed: v });
  }

  startDrag() {
    return (e) => {
      e.preventDefault();
      const track = e.currentTarget;
      const move = (ev) => {
        const r = track.getBoundingClientRect();
        const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
        this.setSpeed(((x - r.left) / r.width) * 100);
      };
      move(e);
      const up = () => {
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      };
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    };
  }

  flow() {
    const dur = (3.2 - (this.state.speed / 100) * 2.8).toFixed(2) + 's';
    return React.createElement('svg', {
      viewBox: '0 0 880 580', width: '100%', height: '100%',
      preserveAspectRatio: 'xMidYMid meet',
      style: { position: 'absolute', inset: 0, pointerEvents: 'none' }
    }, React.createElement('rect', {
      x: 260, y: 170, width: 360, height: 260, rx: 2, fill: 'none',
      stroke: '#fbbf24', strokeWidth: 3.5, strokeLinecap: 'round',
      strokeDasharray: '0.5 17.5',
      style: {
        animation: `flow ${dur} linear infinite`,
        animationPlayState: this.state.run ? 'running' : 'paused'
      }
    }));
  }

  circuit() {
    const SVG = `<svg viewBox="0 0 880 580" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="display:block">
      <g stroke="currentColor">
        <path d="M260 170 H400"/><path d="M480 170 H620"/>
        <path d="M620 170 V240"/><path d="M620 360 V430"/>
        <path d="M620 430 H440"/><path d="M420 430 H260"/>
        <path d="M260 430 V324"/><path d="M260 282 V170"/>
      </g>
      <rect x="400" y="158" width="80" height="24" rx="3"/>
      <rect x="430" y="164" width="20" height="12" rx="2" stroke-width="1.4"/>
      <path d="M620 240 A15 15 0 0 0 620 270 A15 15 0 0 0 620 300 A15 15 0 0 0 620 330 A15 15 0 0 0 620 360"/>
      <path d="M420 406 V454"/><path d="M440 406 V454"/>
      <g stroke="#16a34a" stroke-width="2.6">
        <path d="M244 280 H276"/><path d="M252 294 H268"/>
        <path d="M244 312 H276"/><path d="M252 326 H268"/>
      </g>
      <g fill="currentColor" stroke="none">
        <circle cx="260" cy="170" r="4"/><circle cx="620" cy="170" r="4"/>
        <circle cx="620" cy="430" r="4"/><circle cx="260" cy="430" r="4"/>
      </g>
      <g fill="currentColor" stroke="none" font-family="'Geist Mono',monospace" font-size="17" font-weight="600">
        <text x="440" y="142" text-anchor="middle">10 &#937;</text>
        <text x="648" y="306">1 H</text>
        <text x="430" y="480" text-anchor="middle">15 &#181;F</text>
      </g>
      <g fill="#16a34a" stroke="none" font-family="'Geist Mono',monospace" font-size="15" font-weight="600">
        <text x="232" y="308" text-anchor="end">5 V</text>
      </g>
      <g fill="#f59e0b" stroke="none" font-family="'Geist Mono',monospace" font-size="13" font-weight="600">
        <text x="300" y="158">input</text>
        <text x="582" y="158" text-anchor="end">output</text>
      </g>
    </svg>`;
    return React.createElement('div', {
      dangerouslySetInnerHTML: { __html: SVG },
      style: { position: 'absolute', inset: 0 }
    });
  }

  renderVals() {
    return {
      circuit: this.circuit(),
      flow: this.flow(),
      run: this.state.run,
      stopped: !this.state.run,
      speed: this.state.speed,
      toggle: () => this.toggle(),
      drag: this.startDrag(),
    };
  }
}
</script>
</body>
</html>
